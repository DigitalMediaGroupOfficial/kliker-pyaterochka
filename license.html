<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Активация лицензии</title>
    <style>
    
        body {
            background: linear-gradient(135deg, #0f2027, #203a43);
            font-family: 'Courier New', Courier, monospace;
            color: #e0f2f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .license-container {
            background: #111;
            border: 3px solid #007bff;
            border-radius: 12px;
            padding: 3rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .5);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            color: #00bfff;
            text-align: center;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: .5rem;
            font-size: 1.1rem;
        }
        input[type="text"] {
            width: 100%;
            padding: .8rem;
            border: 2px solid #444;
            border-radius: 6px;
            background: #0a0a0a;
            color: #fff;
            font-size: 1.2rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00bfff;
            box-shadow: 0 0 5px #00bfff;
        }
        button {
            background: #00bfff;
            color: #0a0a0a !important;
            border: none;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: .3s;
        }
        button[disabled] {
            background: #999;
            cursor: not-allowed;
        }
        button[disabled]:hover {
            background: #999;
        }
        button:hover {
            background: #009acd;
        }
        .message {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 1.2rem;
        }
        .success {
             color: #28a745; /* Зеленый */
         }
         .error {
             color: #dc3545; /* Красный */
         }
    </style>
</head>
<body>
    <div class="license-container">
        <h1>🔐 Активация лицензии</h1>
        <p>Введите лицензионный ключ для доступа к игре</p>

        <div class="input-group">
             <label for="license-key-input">Лицензионный ключ:</label>
             <input type="text" id="license-key-input" placeholder="Введите ключ здесь" autofocus>
         </div>

         <button id="activate-btn">Активировать и запустить игру</button>

         <div class="message" id="message-box"></div>
     </div>

    <script>
    // Массив валидных ключей (база данных)

     ];

     // Функция обработки активации
     function activateLicense() {
         const inputField = document.getElementById('license-key-input');
         const messageBox = document.getElementById('message-box');
         const button = document.getElementById('activate-btn');
         
         const userInput = inputField.value.trim();

         // Проверка на пустоту
         if (!userInput) {
             messageBox.className = 'message error';
             messageBox.textContent = '❌ Пожалуйста, введите лицензионный ключ.';
             return; // Останавливаем выполнение функции
         }

         // Блокируем кнопку, чтобы избежать повторных нажатий во время проверки
         button.disabled = true;
         messageBox.textContent = '⏳ Проверка ключа...';

         // Проверка ключа в базе данных
         if (validLicenses.includes(userInput)) {
             // --- УСПЕШНАЯ АКТИВАЦИЯ ---
             localStorage.setItem('license_key', userInput); // Сохраняем ключ

             messageBox.className = 'message success';
             messageBox.textContent = '✅ Лицензия активирована! Запуск игры...';

             // Перенаправление на страницу игры через 1.5 секунды
             setTimeout(() => window.location.href = 'game.html', 1500);

         } else {
             // --- ОШИБКА АКТИВАЦИИ ---
             messageBox.className = 'message error';
             messageBox.textContent = '🚫 Неверный лицензионный ключ. Доступ запрещен.';

             // Перенаправление на страницу блокировки через 2.5 секунды
             setTimeout(() => window.location.href = 'block.html', 2500);
         }

         // Разблокируем кнопку после завершения логики (в любом случае)
         button.disabled = false;
     }

     // Слушатель события клика по кнопке активации
     document.getElementById('activate-btn').addEventListener('click', activateLicense);
    </script>
</body>
</html>
